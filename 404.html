<!DOCTYPE html>
<!--
Purpose: This is a simple error page for when a page cannot be found.
-->
<html>
<head>
    <!-- This helps the browser display text correctly. -->
    <meta charset="UTF-8">

    <!-- The title appears in the browser tab. -->
    <title>404 - Page Not Found</title>
</head>
<body>

    <!-- Main error heading -->
    <h1>404 - Page Not Found</h1>

    <!-- Short explanation for the user -->
    <p>The page you are looking for does not exist.</p>

</body>
</html>
