<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Basic Website with CSS and JavaScript</title>

    <!-- Link to the CSS file (controls appearance) -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Main heading -->
    <h1>Hello, world!</h1>

    <!-- Explanation for the user -->
    <p>Click the button below to show the current time.</p>

    <!-- Button that triggers JavaScript -->
    <button onclick="showTime()">Show Current Time</button>

    <!-- Area where JavaScript will display the time -->
    <p id="time-display"></p>

    <!-- Link to the JavaScript file (adds behavior) -->
    <script src="script.js"></script>

</body>
</html>
